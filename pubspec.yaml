name: secondmobilebrain
description: "Second Brain Clipper — Obsidian Web Clipper for Android"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Share intent receiver — catches URLs shared from other Android apps
  receive_sharing_intent: ^1.8.1

  # HTTP client — fetches web pages to extract metadata
  http: ^1.6.0

  # HTML parser — parses DOM to extract title, meta tags, OG tags, content
  html: ^0.15.6

  # Google Sign-In — OAuth authentication for Drive API access
  google_sign_in: ^6.2.0

  # Google APIs — Drive API client for uploading markdown files
  googleapis: ^13.0.0

  # Google API Auth — HTTP client with Google auth headers
  googleapis_auth: ^1.6.0

  # Path utilities — sanitizing filenames
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
